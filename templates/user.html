{% extends 'layout.html' %}
{% block title %}User Profile - StudyLib{% endblock %}
{% block content %}
<main class="container py-5 archive-page archive-page-auth">
    <span class="archive-illustration illustration-compass" aria-hidden="true"></span>
    <span class="archive-illustration illustration-sextant" aria-hidden="true"></span>
    <span class="archive-illustration illustration-books" aria-hidden="true"></span>
    <span class="archive-illustration illustration-scholar" aria-hidden="true"></span>
    <span class="archive-illustration illustration-victorian-man" aria-hidden="true"></span>
    <span class="archive-illustration illustration-candlestick" aria-hidden="true"></span>
    <span class="archive-illustration illustration-telescope" aria-hidden="true"></span>
    <span class="archive-illustration illustration-hourglass" aria-hidden="true"></span>
    <span class="archive-illustration illustration-armillary-sphere" aria-hidden="true"></span>
    <span class="archive-illustration illustration-oil-lamp" aria-hidden="true"></span>
    
    <div class="archive-content">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header text-center">
                        <img src="{{ profile_picture }}" alt="Profile picture" class="rounded-circle" style="width: 96px; height: 96px; object-fit: cover; border: 3px solid var(--bs-card-border-color, currentColor);">
                        <h4 class="mb-0 mt-2">{{ user.name or user.username }}</h4>
                    </div>
                    <div class="card-body">
                        <form method="post" novalidate>
                            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                            <div class="mb-3">
                                <label for="name" class="form-label">Full Name</label>
                                <input type="text" id="name" name="name" class="form-control" value="{{ user.name or '' }}">
                            </div>
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" id="username" name="username" class="form-control" required value="{{ user.username or '' }}">
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" id="email" name="email" class="form-control" required value="{{ user.email or '' }}">
                            </div>
                            <div class="mb-3">
                                <label for="gender" class="form-label">Gender</label>
                                <select id="gender" name="gender" class="form-select">
                                    <option value="gentleman" {{ 'selected' if gender == 'gentleman' else '' }}>Gentleman</option>
                                    <option value="lady" {{ 'selected' if gender == 'lady' else '' }}>Lady</option>
                                    <option value="secret" {{ 'selected' if gender == 'secret' else '' }}>I'll never tell...</option>
                                </select>
                            </div>
                            <hr>
                            <div class="mb-3">
                                <label for="new_password" class="form-label">New Password (leave blank to keep current)</label>
                                <input type="password" id="new_password" name="new_password" class="form-control" autocomplete="new-password">
                            </div>
                            <div class="mb-3">
                                <label for="confirm_password" class="form-label">Confirm New Password</label>
                                <input type="password" id="confirm_password" name="confirm_password" class="form-control" autocomplete="new-password">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Save Changes</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
{% endblock %}
