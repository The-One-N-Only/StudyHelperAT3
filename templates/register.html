{% extends 'layout.html' %}

{% block title %}Register - StudyLib{% endblock %}

{% block content %}
<main class="container py-5 archive-page archive-page-auth">
    <span class="archive-illustration illustration-compass" aria-hidden="true"></span>
    <span class="archive-illustration illustration-sextant" aria-hidden="true"></span>
    <span class="archive-illustration illustration-books" aria-hidden="true"></span>
    <span class="archive-illustration illustration-scholar" aria-hidden="true"></span>
    <span class="archive-illustration illustration-victorian-man" aria-hidden="true"></span>
    <span class="archive-illustration illustration-candlestick" aria-hidden="true"></span>
    <span class="archive-illustration illustration-telescope" aria-hidden="true"></span>
    <span class="archive-illustration illustration-hourglass" aria-hidden="true"></span>
    <span class="archive-illustration illustration-armillary-sphere" aria-hidden="true"></span>
    <span class="archive-illustration illustration-oil-lamp" aria-hidden="true"></span>
    
    <div class="archive-content">
        <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header">
                    <h4 class="mb-0">Create an account</h4>
                </div>
                <div class="card-body">
                    <form method="post" novalidate>
                        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                        <div class="mb-3">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" id="name" name="name" class="form-control" value="{{ form_values.name if form_values is defined else '' }}">
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" id="email" name="email" class="form-control" required value="{{ form_values.email if form_values is defined else '' }}">
                        </div>
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" id="username" name="username" class="form-control" required value="{{ form_values.username if form_values is defined else '' }}">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" id="password" name="password" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="confirm_password" class="form-label">Confirm password</label>
                            <input type="password" id="confirm_password" name="confirm_password" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="gender" class="form-label">Gender</label>
                            <select id="gender" name="gender" class="form-select">
                                <option value="gentleman" {{ 'selected' if (form_values.gender if form_values is defined else 'gentleman') == 'gentleman' else '' }}>Gentleman</option>
                                <option value="lady" {{ 'selected' if (form_values.gender if form_values is defined else 'gentleman') == 'lady' else '' }}>Lady</option>
                                <option value="secret" {{ 'selected' if (form_values.gender if form_values is defined else 'gentleman') == 'secret' else '' }}>I'll never tell...</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary">Register</button>
                    </form>
                </div>
                <div class="card-footer text-muted">
                    Already have an account? <a href="{{ url_for('login') }}">Login here</a>.
                </div>
            </div>
        </div>
    </div>
    </div>
</main>
{% endblock %}
