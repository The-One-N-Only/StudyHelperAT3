<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500" aria-hidden="true" focusable="false" fill="none" stroke="#A9824F" stroke-width="2">
  <circle cx="250" cy="250" r="150"/>
  <ellipse cx="250" cy="250" rx="150" ry="60"/>
  <ellipse cx="250" cy="250" rx="60" ry="150"/>
  <ellipse cx="250" cy="250" rx="150" ry="100" transform="rotate(45 250 250)"/>
  <ellipse cx="250" cy="250" rx="150" ry="100" transform="rotate(-45 250 250)"/>
  <!-- Axis -->
  <line x1="250" y1="50" x2="250" y2="450" stroke-width="3"/>
  <circle cx="250" cy="50" r="8"/>
  <circle cx="250" cy="450" r="8"/>
  <!-- Center globe -->
  <circle cx="250" cy="250" r="40" stroke-width="1.5"/>
  <ellipse cx="250" cy="250" rx="40" ry="15" stroke-width="1.5"/>
  <!-- Stand -->
  <path d="M250 400 L250 480 M250 480 L200 490 M250 480 L300 490"/>
  <!-- Hatching on rings -->
  <line x1="180" y1="190" x2="180" y2="310" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="320" y1="190" x2="320" y2="310" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="160" y1="220" x2="340" y2="220" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="160" y1="280" x2="340" y2="280" stroke-width="0.5" stroke-dasharray="2,3"/>
</svg>